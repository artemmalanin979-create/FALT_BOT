<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALT Laundry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .balance { font-size: 32px; font-weight: bold; color: #667eea; text-align: center; margin: 20px 0; }
        .machine-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .machine-item { background: #f8f9fa; padding: 15px; border-radius: 12px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .machine-item.selected { border-color: #667eea; background: #f0f4ff; }
        #app { display: none; }
    </style>
</head>
<body>
    <div id="login">
        <div class="header"><h1>🧺 FALT Laundry</h1><p>Войдите через email</p></div>
        <div class="container">
            <div class="card">
                <input type="email" class="input" id="emailInput" placeholder="your@email.com">
                <button class="btn" onclick="login()">Войти</button>
                <button class="btn btn-secondary" onclick="openBot()">Открыть бота</button>
            </div>
        </div>
    </div>
    <div id="app">
        <div class="header"><h1>🧺 FALT Laundry</h1><p id="userName">Привет!</p></div>
        <div class="container">
            <div class="card"><h2>💰 Баланс</h2><div class="balance" id="balance">0 ₽</div></div>
            <div class="card"><h2>🧺 Машины</h2><div id="machinesList" class="machine-grid"></div></div>
            <div class="card">
                <h2>📅 Бронирование</h2>
                <input type="date" class="input" id="dateInput">
                <select class="input" id="timeInput"><option value="">Выберите время</option><option value="08:00-10:00">08:00-10:00</option><option value="10:00-12:00">10:00-12:00</option><option value="12:00-14:00">12:00-14:00</option><option value="14:00-16:00">14:00-16:00</option><option value="16:00-18:00">16:00-18:00</option><option value="18:00-20:00">18:00-20:00</option><option value="20:00-22:00">20:00-22:00</option></select>
                <button class="btn" onclick="book()">Забронировать</button>
            </div>
            <button class="btn btn-secondary" onclick="logout()">Выйти</button>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        let token = localStorage.getItem('falt_token'), user = null, selectedMachine = null;
        if (token) showApp();
        function showLogin() { document.getElementById('login').style.display = 'block'; document.getElementById('app').style.display = 'none'; }
        function showApp() { document.getElementById('login').style.display = 'none'; document.getElementById('app').style.display = 'block'; loadUserData(); loadMachines(); }
        async function login() { const email = document.getElementById('emailInput').value; if (!email) return; try { const res = await fetch(`${API_URL}/auth/login`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email})}); const data = await res.json(); if (data.success) { token = data.token; user = data.user; localStorage.setItem('falt_token', token); showApp(); } else { alert('Ошибка: ' + (data.detail || 'Неизвестная ошибка')); } } catch (e) { alert('Ошибка соединения'); } }
        function logout() { localStorage.removeItem('falt_token'); token = null; user = null; showLogin(); }
        function openBot() { if (window.Telegram?.WebApp) window.Telegram.WebApp.openTelegramLink('https://t.me/FALT_BOT'); else window.open('https://t.me/FALT_BOT', '_blank'); }
        async function loadUserData() { if (!token) return; try { const res = await fetch(`${API_URL}/wallet/balance`, {headers: {'Authorization': 'Bearer ' + token}}); const data = await res.json(); document.getElementById('balance').textContent = data.balance + ' ₽'; if (user) document.getElementById('userName').textContent = `Привет, ${user.name}!`; } catch (e) {} }
        async function loadMachines() { try { const res = await fetch(`${API_URL}/machines`); const machines = await res.json(); document.getElementById('machinesList').innerHTML = machines.map(m => `<div class="machine-item ${m.is_working ? '' : 'unavailable'}" onclick="selectMachine('${m.id}', this)"><div>${m.name}</div><div style="font-size:12px;color:#666">${m.price_per_hour} ₽/ч</div></div>`).join(''); } catch (e) {} }
        function selectMachine(id, el) { if (el.classList.contains('unavailable')) return; document.querySelectorAll('.machine-item').forEach(i => i.classList.remove('selected')); el.classList.add('selected'); selectedMachine = id; }
        async function book() { if (!selectedMachine) { alert('Выберите машинку'); return; } const date = document.getElementById('dateInput').value, time = document.getElementById('timeInput').value; if (!date || !time) { alert('Выберите дату и время'); return; } const [start, end] = time.split('-'); try { const res = await fetch(`${API_URL}/bookings/pay`, {method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({bookings: [{date: date.split('-').reverse().join('.'), machine_id: selectedMachine, start_time: start, end_time: end}]})}); const data = await res.json(); if (data.success) { alert('Бронирование успешно! Списано: ' + data.charged + ' ₽'); loadUserData(); } else { alert('Ошибка: ' + (data.detail || 'Недостаточно средств')); } } catch (e) { alert('Ошибка соединения'); } }
        if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
    </script>
</body>
</html>
